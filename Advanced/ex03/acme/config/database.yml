default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "db") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USER", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "acme_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_TEST_NAME", "acme_test") %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] if ENV["DATABASE_URL"].present? %>
  database: <%= ENV.fetch("DATABASE_NAME", "acme_production") %>
